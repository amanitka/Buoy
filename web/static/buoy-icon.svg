<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%" role="img" aria-labelledby="buoyTitle buoyDesc">
  <title id="buoyTitle">Buoy icon</title>
  <desc id="buoyDesc">Kubernetes-blue buoy emblem in a hexagonal badge.</desc>
  <defs>
    <linearGradient id="hexGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a86f7"/>
      <stop offset="100%" stop-color="#2558c6"/>
    </linearGradient>
    <linearGradient id="coreGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#163a75" flood-opacity="0.35"/>
    </filter>
  </defs>

  <polygon points="64,8 112,36 112,92 64,120 16,92 16,36" fill="url(#hexGradient)" filter="url(#softShadow)"/>
  <polygon points="64,16 105,40 105,88 64,112 23,88 23,40" fill="#1f3f81" opacity="0.35"/>

  <g transform="translate(64 67)">
    <circle cx="0" cy="-28" r="10" fill="none" stroke="url(#coreGradient)" stroke-width="6"/>
    <rect x="-4" y="-23" width="8" height="40" rx="4" fill="url(#coreGradient)"/>
    <rect x="-20" y="-10" width="40" height="8" rx="4" fill="url(#coreGradient)"/>
    <path d="M-26 18a26 26 0 0 0 52 0h-8a18 18 0 0 1-36 0z" fill="url(#coreGradient)"/>
    <path d="M-26 18l8-13 6 13zm52 0l-8-13-6 13z" fill="url(#coreGradient)"/>
  </g>

  <circle cx="95" cy="35" r="5" fill="#7fb1ff" opacity="0.9"/>
