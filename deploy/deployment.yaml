apiVersion: v1
kind: Namespace
metadata:
  name: buoy-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buoy
  namespace: buoy-system
  labels:
    app: buoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buoy
  template:
    metadata:
      labels:
        app: buoy
    spec:
      serviceAccountName: buoy
      containers:
      - name: buoy
        image: your-registry/buoy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
