apiVersion: v1
kind: ServiceAccount
metadata:
  name: buoy
  namespace: buoy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: buoy
rules:
  # Read permissions for watching resources
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Patch permissions for triggering rolling updates
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: buoy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: buoy
subjects:
  - kind: ServiceAccount
    name: buoy
    namespace: buoy-system
