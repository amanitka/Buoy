apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buoy
  namespace: buoy-system
  annotations:
    # Traefik forward-auth configuration
    traefik.ingress.kubernetes.io/router.middlewares: auth-system-forward-auth@kubernetescrd
    # Optional: Additional Traefik annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: buoy.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: buoy
            port:
              number: 80
  tls:
  - hosts:
    - buoy.example.com
    secretName: buoy-tls
